{% extends "base.html" %}

{% block title %}Login - Hybrid Cloud Controller{% endblock %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-5-tablet is-4-desktop">
        <div class="box">
            <h1 class="title has-text-centered">Login</h1>
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="field">
                    <label class="label">Username</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" name="username" placeholder="Enter your username" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label">Password</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" name="password" placeholder="Enter your password" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary is-fullwidth" type="submit">
                            <span class="icon">
                                <i class="fas fa-sign-in-alt"></i>
                            </span>
                            <span>Login</span>
                        </button>
                    </div>
                </div>
            </form>
            
            <div class="has-text-centered mt-4">
                <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
            </div>
        </div>
        
        <div class="notification is-info is-light">
            <span class="icon-text">
                <span class="icon">
                    <i class="fas fa-lock"></i>
                </span>
                <span>All communications are secured with HTTPS</span>
            </span>
        </div>
    </div>
</div>
{% endblock %}
