{% extends "base.html" %}

{% block title %}Register - Hybrid Cloud Controller{% endblock %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-5-tablet is-4-desktop">
        <div class="box">
            <h1 class="title has-text-centered">Create Account</h1>
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="field">
                    <label class="label">Username</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" name="username" placeholder="Choose a username" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label">Password</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" name="password" placeholder="Choose a password" required minlength="8">
                        <span class="icon is-small is-left">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                    <p class="help">Password must be at least 8 characters long</p>
                </div>
                
                <div class="field">
                    <label class="label">Confirm Password</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" name="confirm_password" placeholder="Confirm your password" required minlength="8">
                        <span class="icon is-small is-left">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary is-fullwidth" type="submit">
                            <span class="icon">
                                <i class="fas fa-user-plus"></i>
                            </span>
                            <span>Create Account</span>
                        </button>
                    </div>
                </div>
            </form>
            
            <div class="has-text-centered mt-4">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
            </div>
        </div>
        
        <div class="notification is-info is-light">
            <span class="icon-text">
                <span class="icon">
                    <i class="fas fa-shield-alt"></i>
                </span>
                <span>Passwords are securely hashed with bcrypt</span>
            </span>
        </div>
    </div>
</div>
{% endblock %}
